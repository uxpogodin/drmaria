<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>В баню</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wood-deep:  #0d0905;
      --wood-dark:  #1a1008;
      --wood-mid:   #2e1e0e;
      --ember:      #c85c18;
      --amber:      #d4861e;
      --amber-lt:   #e8b84a;
      --cream:      #eedfc4;
      --muted:      #7a6040;
    }

    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--wood-deep);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* ── Wood plank background ── */
    #wood-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        /* Fine grain lines */
        repeating-linear-gradient(
          178deg,
          transparent 0px,
          transparent 28px,
          rgba(0,0,0,.18) 28px,
          rgba(0,0,0,.18) 29px,
          transparent 29px,
          transparent 52px,
          rgba(255,200,100,.025) 52px,
          rgba(255,200,100,.025) 53px
        ),
        /* Plank separators */
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 118px,
          rgba(0,0,0,.25) 118px,
          rgba(0,0,0,.25) 120px
        ),
        /* Base wood gradient */
        linear-gradient(165deg,
          #1e1108 0%,
          #120c05 30%,
          #1a1008 55%,
          #0f0904 80%,
          #170f07 100%
        );
    }

    /* ── Ember glow from below ── */
    #ember-glow {
      position: fixed;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 110vw; height: 220px;
      background: radial-gradient(ellipse at 50% 100%,
        rgba(180,60,10,.38) 0%,
        rgba(140,40,5,.18) 38%,
        transparent 70%
      );
      pointer-events: none; z-index: 0;
      filter: blur(8px);
    }

    /* ── Top amber lamp glow ── */
    #lamp-glow {
      position: fixed;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 70vw; height: 160px;
      background: radial-gradient(ellipse at 50% 0%,
        rgba(200,120,20,.18) 0%,
        rgba(180,100,10,.08) 45%,
        transparent 70%
      );
      pointer-events: none; z-index: 0;
      filter: blur(6px);
    }

    /* ── Venik watermark ── */
    #venik-bg {
      position: fixed;
      right: -30px; bottom: -20px;
      width: min(72vw, 310px);
      transform: rotate(-18deg);
      transform-origin: bottom right;
      opacity: .09;
      pointer-events: none; z-index: 0;
      filter: sepia(80%) brightness(.7);
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── App layout ── */
    #app {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 32px 28px;
    }

    /* ── Stamp header ── */
    .stamp-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 18px;
    }
    .stamp-label {
      font-size: .6rem; font-weight: 600;
      color: var(--amber);
      letter-spacing: .28em; text-transform: uppercase;
      opacity: .65;
      margin-bottom: 4px;
    }
    .stamp-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2.1rem, 9vw, 3rem);
      color: var(--amber-lt);
      letter-spacing: .05em;
      line-height: 1;
      text-align: center;
      text-shadow: 0 2px 24px rgba(200,90,20,.45), 0 0 2px rgba(220,160,60,.2);
    }

    /* ── Horizontal rule (wood burn style) ── */
    .burn-rule {
      width: 100%;
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0;
      flex-shrink: 0;
    }
    .burn-rule::before,
    .burn-rule::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(190,120,30,.35), transparent);
    }
    .burn-rule-icon {
      font-size: .75rem; opacity: .5;
      flex-shrink: 0;
    }

    /* ── Guest block ── */
    .guest-block {
      display: flex; align-items: center;
      gap: 14px;
      width: 100%;
      margin-bottom: 2px;
    }
    .photo-wrap {
      position: relative;
      width: 58px; height: 58px;
      flex-shrink: 0;
    }
    .photo-wrap img,
    .photo-fallback {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .photo-fallback {
      display: flex; align-items: center; justify-content: center;
      background: var(--wood-mid);
      font-family: 'Playfair Display', serif;
      font-style: italic; font-weight: 700;
      font-size: 1.5rem;
      color: rgba(212,134,30,.7);
    }
    .photo-ring {
      position: absolute; inset: -2.5px;
      border-radius: 50%;
      border: 1.4px solid rgba(212,134,30,.55);
      pointer-events: none;
    }
    .guest-text { flex: 1; min-width: 0; }
    .guest-greeting {
      font-size: .65rem; font-weight: 400;
      color: var(--muted);
      letter-spacing: .18em; text-transform: uppercase;
      margin-bottom: 2px;
    }
    .guest-name {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-weight: 700;
      font-size: clamp(1.35rem, 6vw, 1.8rem);
      color: var(--cream);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .invite-sub {
      font-size: .8rem; font-weight: 300;
      color: rgba(238,223,196,.5);
      line-height: 1.4;
      text-align: left;
      margin-top: 3px;
    }

    /* ── Detail rows ── */
    .details {
      width: 100%;
      display: flex; flex-direction: column;
      gap: 0;
      margin-bottom: 20px;
    }
    .detail-row {
      display: flex; align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 4px 0;
      text-decoration: none;
      color: inherit;
      cursor: default;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .detail-row:last-child { border-bottom: none; }
    a.detail-row { cursor: pointer; }
    a.detail-row:active { opacity: .7; }
    .detail-icon {
      width: 28px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-icon svg {
      width: 15px; height: 15px;
      stroke: rgba(212,134,30,.55);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .detail-text {
      font-size: .85rem; font-weight: 400;
      color: var(--cream);
    }
    .detail-arrow {
      margin-left: auto;
      font-size: .65rem;
      opacity: .3;
    }

    /* ── CTA button ── */
    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      height: 52px;
      border-radius: 6px;
      background: linear-gradient(135deg, #8c2c04 0%, #c85c18 50%, #d4861e 100%);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: .88rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(180,60,10,.35), inset 0 1px 0 rgba(255,220,150,.15);
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .cta-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.12) 0%, transparent 55%);
    }
    /* Wood grain texture overlay on button */
    .cta-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        92deg,
        transparent, transparent 18px,
        rgba(0,0,0,.06) 18px, rgba(0,0,0,.06) 19px
      );
    }
    .cta-btn:hover  { opacity: .88; }
    .cta-btn:active { transform: scale(.97); }

    /* ── Blur backdrop ── */
    #blur-layer {
      position: fixed; inset: 0; z-index: 10;
      backdrop-filter: blur(18px) brightness(.55) saturate(.7);
      -webkit-backdrop-filter: blur(18px) brightness(.55) saturate(.7);
      pointer-events: none;
      transition: opacity .7s ease;
    }
    #blur-layer.gone { opacity: 0; }

    /* ── Fog canvas ── */
    #fog-canvas {
      position: fixed; inset: 0; z-index: 11;
      touch-action: none;
      cursor: crosshair;
      transition: opacity .7s ease;
    }
    #fog-canvas.gone { opacity: 0; pointer-events: none; }

    /* ── Hint ── */
    #hint {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex; flex-direction: column; align-items: center;
      gap: 9px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .5s ease;
    }
    #hint.visible { opacity: 1; }
    #hint.hidden  { opacity: 0; }
    #hint-text {
      font-size: .66rem; font-weight: 400;
      color: rgba(255,255,255,.38);
      letter-spacing: .16em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #progress-wrap {
      width: 100px; height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(to right, #c85c18, #e8b84a);
      transition: width .18s ease;
    }
  </style>
</head>
<body>

<div id="wood-bg"    aria-hidden="true"></div>
<div id="ember-glow" aria-hidden="true"></div>
<div id="lamp-glow"  aria-hidden="true"></div>
<img  id="venik-bg" src="venik.png" alt="" aria-hidden="true" draggable="false">

<!-- ── Invitation ── -->
<div id="app">

  <!-- БАНЯ stamp -->
  <div class="stamp-wrap">
    <span class="stamp-label">приглашение</span>
    <span class="stamp-title">В БАНЮ</span>
  </div>

  <div class="burn-rule"><span class="burn-rule-icon">✦</span></div>

  <!-- Guest -->
  <div class="guest-block">
    <div class="photo-wrap" id="photo-wrap">
      <img id="guest-photo" src="" alt="">
      <div class="photo-ring"></div>
    </div>
    <div class="guest-text">
      <p class="guest-greeting">Привет,</p>
      <p class="guest-name" id="guest-name">Гость</p>
      <p class="invite-sub" id="invite-title"></p>
    </div>
  </div>

  <div class="burn-rule"><span class="burn-rule-icon">✦</span></div>

  <!-- Details -->
  <div class="details">
    <div class="detail-row">
      <span class="detail-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </span>
      <span class="detail-text" id="detail-date"></span>
    </div>
    <div class="detail-row">
      <span class="detail-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14.5"/></svg>
      </span>
      <span class="detail-text" id="detail-time"></span>
    </div>
    <a class="detail-row" id="maps-link" href="#" target="_blank" rel="noopener noreferrer">
      <span class="detail-icon">
        <svg viewBox="0 0 24 24"><path d="M12 22s-7-6.686-7-11.5a7 7 0 0 1 14 0C19 15.314 12 22 12 22z"/><circle cx="12" cy="10.5" r="2.5"/></svg>
      </span>
      <span class="detail-text" id="detail-address"></span>
      <span class="detail-arrow">↗</span>
    </a>
    <div class="detail-row">
      <span class="detail-icon">
        <svg viewBox="0 0 24 24"><path d="M3 12c0-1.5 1.5-3 3-3s3 1.5 3 3-1.5 3-3 3-3-1.5-3-3z"/><path d="M15 9c0-1.5 1.5-3 3-3s3 1.5 3 3-1.5 3-3 3-3-1.5-3-3z"/><path d="M6 12c2 3 4 4.5 6 4.5s4-1.5 6-4.5"/></svg>
      </span>
      <span class="detail-text">Взять купальник</span>
    </div>
  </div>

  <a class="cta-btn" id="cta-btn" href="#" target="_blank" rel="noopener noreferrer">
    Буду! Топите баню 🔥
  </a>

</div>

<!-- ── Blur + Fog ── -->
<div id="blur-layer" aria-hidden="true"></div>
<canvas id="fog-canvas" aria-label="Сотри пар, чтобы открыть приглашение"></canvas>

<!-- ── Hint ── -->
<div id="hint" role="status" aria-live="polite">
  <span id="hint-text">проведи пальцем</span>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
</div>

<script>
"use strict";

// ════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════
const CONFIG = {
  hostName:         "Маша",
  date:             "14 апреля, вторник",
  time:             "19:00 – 23:00",
  address:          "ул. Берёзовая, 12",
  mapsUrl:          "https://maps.google.com/?q=ул.+Берёзовая+12",
  telegramUsername: "+79167205415",
  telegramText:     (name) => `Привет, Маша! Это ${name} — буду 14 апреля в 19:00 🔥`,
  inviteTitle:      () => `Маша отмечает день рождения\nв шоу-бане — танцы, песни, пар 🎤`,
  defaultPhoto:     "",
  revealThreshold:  0.30,
};

// ════════════════════════════════════════════════════
// GUESTS  — добавляй новых сюда
// URL: ?guest=rita
// ════════════════════════════════════════════════════
const GUESTS = {
  rita:    { name: "Рита",   photo: "Рита.png"   },
  ksyusha: { name: "Ксюша",  photo: "Ксюша.png"  },
  lena:    { name: "Лена",   photo: "Лена.png"    },
  natasha: { name: "Наташа", photo: "Наташа.png"  },
};

const params = new URLSearchParams(location.search);
const guestKey  = params.get("guest");
const guest     = GUESTS[guestKey] || null;
const guestName = guest?.name  || params.get("name")  || "Гость";
const photoSrc  = guest?.photo || params.get("photo") || CONFIG.defaultPhoto;

// ════════════════════════════════════════════════════
// FILL CONTENT
// ════════════════════════════════════════════════════
document.getElementById("guest-name").textContent     = guestName;
document.getElementById("detail-date").textContent    = CONFIG.date;
document.getElementById("detail-time").textContent    = CONFIG.time;
document.getElementById("detail-address").textContent = CONFIG.address;
document.getElementById("maps-link").href             = CONFIG.mapsUrl;
document.getElementById("cta-btn").href               = `https://t.me/${CONFIG.telegramUsername}`;
document.getElementById("invite-title").innerHTML     =
  CONFIG.inviteTitle(guestName).replace(/\n/g, "<br>");

// Photo
const photoImg  = document.getElementById("guest-photo");
const photoWrap = document.getElementById("photo-wrap");

if (photoSrc) {
  photoImg.src = photoSrc;
  photoImg.alt = guestName;
  photoImg.onerror = showFallback;
} else {
  showFallback();
}

function showFallback() {
  photoImg.style.display = "none";
  const fb = document.createElement("div");
  fb.className   = "photo-fallback";
  fb.textContent = guestName[0] || "?";
  photoWrap.insertBefore(fb, photoImg);
}

// ════════════════════════════════════════════════════
// FOG SYSTEM
// ════════════════════════════════════════════════════
const canvas       = document.getElementById("fog-canvas");
const ctx          = canvas.getContext("2d");
const blurLayer    = document.getElementById("blur-layer");
const hint         = document.getElementById("hint");
const hintText     = document.getElementById("hint-text");
const progressFill = document.getElementById("progress-fill");

const noMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const DPR      = Math.min(devicePixelRatio || 1, 2);

let W = 0, H = 0;
let revealed    = false;
let revealPhase = 0;
let lastCheck   = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (!revealed) drawFog();
}

// ── Fog texture ──────────────────────────────────────
function drawFog() {
  // Warm dense base — slightly brown-grey, not cold
  ctx.fillStyle = "rgba(175, 162, 145, 0.95)";
  ctx.fillRect(0, 0, W, H);

  // Uneven density blobs
  for (let i = 0; i < 22; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const r = 60 + Math.random() * 180;
    const v = 160 + (Math.random() * 32 | 0);
    const a = .07 + Math.random() * .13;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,   `rgba(${v},${v-8},${v-18},${a})`);
    g.addColorStop(.5,  `rgba(${v},${v-8},${v-18},${a*.45})`);
    g.addColorStop(1,   "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(x-r, y-r, r*2, r*2);
  }

  // Dark wispy shadow zones
  for (let i = 0; i < 14; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const r = 30 + Math.random() * 100;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(90,72,55,${.05 + Math.random() * .1})`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(x-r, y-r, r*2, r*2);
  }

  // Warm specular lamp reflections
  const spots = [
    {x:.20,y:.12,r:65,a:.24},{x:.75,y:.22,r:48,a:.18},
    {x:.50,y:.05,r:80,a:.13},{x:.10,y:.65,r:52,a:.10},
    {x:.88,y:.70,r:38,a:.14},{x:.55,y:.90,r:60,a:.08},
    {x:.35,y:.48,r:42,a:.07},
  ];
  for (const s of spots) {
    const sx = s.x*W, sy = s.y*H;
    const g = ctx.createRadialGradient(sx,sy,0, sx,sy,s.r);
    g.addColorStop(0,    `rgba(255,245,220,${s.a})`);
    g.addColorStop(.45,  `rgba(255,238,200,${s.a*.35})`);
    g.addColorStop(1,    "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(sx-s.r, sy-s.r, s.r*2, s.r*2);
  }

  // Micro condensation drops
  for (let i = 0; i < 350; i++) {
    const x = Math.random()*W, y = Math.random()*H;
    const rx = .35 + Math.random()*2.8;
    const ry = rx * (.85 + Math.random()*.8);
    const l  = 90 + (Math.random()*70|0);
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, Math.random()*Math.PI, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${l+40},${l+33},${l+22},${.06+Math.random()*.15})`;
    ctx.fill();
  }

  // Faint vertical moisture streaks
  for (let i = 0; i < 12; i++) {
    const x  = Math.random()*W;
    const y0 = Math.random()*H*.4;
    const y1 = y0 + 14 + Math.random()*70;
    const g  = ctx.createLinearGradient(x, y0, x, y1);
    g.addColorStop(0,   "rgba(140,128,112,0)");
    g.addColorStop(.3,  `rgba(140,128,112,${.04+Math.random()*.07})`);
    g.addColorStop(.88, `rgba(140,128,112,${.02+Math.random()*.04})`);
    g.addColorStop(1,   "rgba(140,128,112,0)");
    ctx.strokeStyle = g;
    ctx.lineWidth = .5 + Math.random()*1.5;
    ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y1); ctx.stroke();
  }
}

// ── Soft erase brush ─────────────────────────────────
function eraseBrush(x, y, radius) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0,    "rgba(0,0,0,1)");
  g.addColorStop(0.28, "rgba(0,0,0,0.95)");
  g.addColorStop(0.58, "rgba(0,0,0,0.62)");
  g.addColorStop(0.80, "rgba(0,0,0,0.22)");
  g.addColorStop(1,    "rgba(0,0,0,0)");
  ctx.save();
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
}

// ── Drip system ──────────────────────────────────────
const drips = [];

function spawnDrip(x, y) {
  if (revealed) return;
  drips.push({
    x:       x + (Math.random()-.5)*16,
    startY:  y,
    endY:    y,
    targetY: Math.min(y + 50 + Math.random()*130, H),
    hw:      1.0 + Math.random()*1.8,
    alpha:   .48 + Math.random()*.38,
    speed:   .45 + Math.random()*1.1,
    alive:   true,
  });
}

function drawDrips() {
  for (const d of drips) {
    if (!d.alive) continue;
    d.endY = Math.min(d.endY + d.speed, d.targetY);
    if (d.endY >= d.targetY) d.alive = false;
    const len = d.endY - d.startY;
    if (len < 1) continue;

    ctx.save();
    ctx.globalCompositeOperation = "destination-out";

    const sw = d.hw * 4;
    const lg = ctx.createLinearGradient(d.x-sw, 0, d.x+sw, 0);
    lg.addColorStop(0,   "rgba(0,0,0,0)");
    lg.addColorStop(.22, `rgba(0,0,0,${d.alpha*.65})`);
    lg.addColorStop(.5,  `rgba(0,0,0,${d.alpha})`);
    lg.addColorStop(.78, `rgba(0,0,0,${d.alpha*.65})`);
    lg.addColorStop(1,   "rgba(0,0,0,0)");
    ctx.fillStyle = lg;
    ctx.fillRect(d.x-sw, d.startY, sw*2, len);

    if (len > 8) {
      const dr = d.hw * 4;
      const dg = ctx.createRadialGradient(d.x, d.endY, 0, d.x, d.endY+dr*.35, dr);
      dg.addColorStop(0,   `rgba(0,0,0,${d.alpha})`);
      dg.addColorStop(.7,  `rgba(0,0,0,${d.alpha*.4})`);
      dg.addColorStop(1,   "rgba(0,0,0,0)");
      ctx.beginPath(); ctx.arc(d.x, d.endY, dr, 0, Math.PI*2);
      ctx.fillStyle = dg; ctx.fill();
    }
    ctx.restore();
  }
  if (drips.length > 50) {
    const alive = drips.filter(d => d.alive);
    drips.length = 0; drips.push(...alive);
  }
}

// ── Reveal check ─────────────────────────────────────
function checkReveal() {
  const now = performance.now();
  if (now - lastCheck < 260 || revealed) return;
  lastCheck = now;

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  let transparent = 0, total = 0;
  for (let i = 3; i < data.length; i += 4*16) {
    total++;
    if (data[i] < 30) transparent++;
  }
  const ratio = total > 0 ? transparent / total : 0;
  const pct   = Math.min(ratio / CONFIG.revealThreshold * 100, 100);
  progressFill.style.width = pct + "%";

  if (revealPhase === 0 && ratio > .06) {
    revealPhase = 1;
    hint.classList.add("visible");
  }
  if (revealPhase === 1 && ratio > CONFIG.revealThreshold * .65) {
    hintText.textContent = "ещё чуть-чуть...";
  }
  if (revealPhase < 2 && ratio >= CONFIG.revealThreshold) {
    revealPhase = 2;
    doReveal();
  }
}

function doReveal() {
  revealed = true;
  hint.classList.remove("visible");
  hint.classList.add("hidden");
  if (noMotion) {
    canvas.style.display    = "none";
    blurLayer.style.display = "none";
  } else {
    canvas.classList.add("gone");
    blurLayer.classList.add("gone");
    setTimeout(() => {
      canvas.style.display    = "none";
      blurLayer.style.display = "none";
    }, 750);
  }
}

// ── Loop ─────────────────────────────────────────────
function loop() {
  if (!revealed) drawDrips();
  requestAnimationFrame(loop);
}

// ── Pointer ──────────────────────────────────────────
let prevX = null, prevY = null, lastMoveTime = 0;
let stationaryTimer = null;
const BRUSH_R = 54;

function onStart(x, y) {
  if (revealed) return;
  prevX = x; prevY = y;
  lastMoveTime = performance.now();
  eraseBrush(x, y, BRUSH_R);
  hint.classList.remove("hidden");
  hint.classList.add("visible");
  clearTimeout(stationaryTimer);
  stationaryTimer = setTimeout(() => spawnDrip(x, y), 380);
  checkReveal();
}
function onMove(x, y) {
  if (revealed || prevX === null) return;
  const dist = Math.hypot(x-prevX, y-prevY);
  const dt   = performance.now() - lastMoveTime;
  const steps = Math.max(Math.ceil(dist/10), 1);
  for (let i = 1; i <= steps; i++) {
    const t = i/steps;
    eraseBrush(prevX+(x-prevX)*t, prevY+(y-prevY)*t, BRUSH_R);
  }
  if (dist/Math.max(dt,1) > 1.6 && Math.random() < .22) spawnDrip(x, y);
  prevX = x; prevY = y;
  lastMoveTime = performance.now();
  clearTimeout(stationaryTimer);
  stationaryTimer = setTimeout(() => spawnDrip(x, y), 380);
  checkReveal();
}
function onEnd() { prevX = null; prevY = null; clearTimeout(stationaryTimer); }

canvas.addEventListener("mousedown",  e => onStart(e.clientX, e.clientY));
canvas.addEventListener("mousemove",  e => { if (prevX !== null) onMove(e.clientX, e.clientY); });
canvas.addEventListener("mouseup",    onEnd);
canvas.addEventListener("mouseleave", onEnd);
canvas.addEventListener("touchstart", e => { e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener("touchmove",  e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener("touchend",   e => { e.preventDefault(); onEnd(); }, { passive: false });

window.addEventListener("resize", () => { if (!revealed) { ctx.setTransform(1,0,0,1,0,0); resize(); } });
resize();
loop();
</script>
</body>
</html>
